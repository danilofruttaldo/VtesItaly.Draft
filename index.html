<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#121214">
<meta name="description" content="VTES Draft Cube interactive gallery: browse the crypt and library cards with search, filters and card detail.">
<link rel="icon" type="image/svg+xml" href="assets/vtes.svg">
<link rel="icon" href="assets/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VTES Draft Cube</title>
<style>
  :root {
    --bg: #121214;
    --panel: #1c1c20;
    --panel-2: #26262c;
    --border: #2a2a30;
    --text: #e8e8ec;
    --muted: #9ca0a8;
    --accent: #c52555;
    --accent-hover: #d13a68;
    --focus: #4fa3ff;
    --shadow: 0 6px 24px rgba(0,0,0,0.45);
    --radius: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-text-size-adjust: 100%;
    line-height: 1.4;
    overscroll-behavior-y: none;
  }

  /* Skip link for keyboard users */
  .skip {
    position: absolute;
    left: -9999px;
    top: 8px;
    padding: 0.5rem 1rem;
    background: var(--accent);
    color: #fff;
    border-radius: var(--radius);
    z-index: 200;
  }
  .skip:focus { left: 8px; }

  :focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
    border-radius: var(--radius);
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 30;
    background: var(--bg);
    padding-top: var(--safe-top);
    transition: box-shadow 0.18s ease;
  }
  .topbar.scrolled { box-shadow: 0 2px 12px rgba(0,0,0,0.4); }

  header {
    padding: 0.85rem calc(1.25rem + var(--safe-right)) 0.6rem calc(1.25rem + var(--safe-left));
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  h1 {
    margin: 0;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .sub { color: var(--muted); font-weight: 400; font-size: 0.85rem; }

  .controls {
    padding: 0.5rem calc(1.25rem + var(--safe-right)) 0.85rem calc(1.25rem + var(--safe-left));
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }
  .controls-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.55rem;
    align-items: center;
  }

  input[type=search] {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.55rem 0.85rem;
    border-radius: var(--radius);
    font-size: 0.95rem;
    flex: 1 1 240px;
    min-width: 0;
    max-width: 480px;
    min-height: 40px;
  }
  input[type=search]::-webkit-search-cancel-button { cursor: pointer; }

  select {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.5rem 0.6rem;
    border-radius: var(--radius);
    font-size: 0.9rem;
    min-height: 36px;
    cursor: pointer;
  }

  input[type=search]:focus, select:focus,
  .chip:focus, .modal-nav:focus, .modal-close:focus {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }
  input[type=search]:focus, select:focus { border-color: var(--accent); }

  .chip {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0 0.85rem;
    border-radius: 999px;
    cursor: pointer;
    font-size: 0.85rem;
    height: 36px;
    line-height: 36px;
    user-select: none;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  @media (hover: hover) {
    .chip:hover:not([aria-pressed="true"]) { background: var(--panel-2); border-color: var(--panel-2); }
    .chip[aria-pressed="true"]:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  }
  .chip[aria-pressed="true"] { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Segmented chip groups (no gap, shared border) */
  .chip-group {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 999px;
    overflow: hidden;
    background: var(--panel);
  }
  .chip-group .chip {
    border-radius: 0;
    border: none;
    border-right: 1px solid var(--border);
    background: transparent;
    padding: 0 0.85rem;
  }
  .chip-group .chip:last-child { border-right: none; }
  .chip-group .chip[aria-pressed="true"] {
    background: var(--accent);
    color: #fff;
  }
  .chip-group .chip:focus-visible { outline-offset: -2px; }

  .chip-reset {
    color: var(--muted);
    background: transparent;
    border-color: transparent;
  }
  .chip-reset[hidden] { display: none; }
  @media (hover: hover) {
    .chip-reset:hover { color: var(--text); background: var(--panel); border-color: var(--border); }
  }

  .count {
    color: var(--muted);
    font-size: 0.85rem;
    margin-left: auto;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  /* Active filter chips (recap) */
  .active-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    padding: 0.55rem calc(1.25rem + var(--safe-right)) 0 calc(1.25rem + var(--safe-left));
    align-items: center;
  }
  .active-filters:empty { display: none; }
  .active-filters .label { color: var(--muted); font-size: 0.8rem; margin-right: 0.25rem; }
  .filter-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.25rem 0.4rem 0.25rem 0.7rem;
    border-radius: 999px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  @media (hover: hover) {
    .filter-chip:hover { background: var(--panel); border-color: var(--accent); }
    .filter-chip:hover .x { background: var(--accent); color: #fff; }
  }
  .filter-chip .x {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    font-size: 0.75rem;
    line-height: 1;
  }
  /* Discipline / token badges */
  .disc {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 0.78em;
    font-weight: 600;
    line-height: 1.4;
    margin: 0 1px;
    vertical-align: 1px;
    background: #4a4a55;
    color: #fff;
    text-transform: lowercase;
    letter-spacing: 0.02em;
  }
  .disc.sup { text-transform: uppercase; }
  /* Discipline color palette */
  .disc-ani { background: #6b8e23; }
  .disc-aus { background: #6a5acd; }
  .disc-cel { background: #d4a017; color: #111; }
  .disc-chi { background: #8b008b; }
  .disc-dom { background: #1e3a8a; }
  .disc-for { background: #654321; }
  .disc-obf { background: #4b5563; }
  .disc-obt { background: #1f2937; }
  .disc-pot { background: #b03030; }
  .disc-pre { background: #c2185b; }
  .disc-pro { background: #2d5016; }
  .disc-ser { background: #2e7d32; }
  .disc-tha { background: #5d2d6b; }
  .disc-thn { background: #3a2a1f; }
  .disc-vic { background: #ad1457; }
  .disc-nec { background: #2a1a3a; }
  .disc-qui { background: #4e342e; }
  .disc-tem { background: #455a64; }
  .disc-mel { background: #d84315; }
  .disc-dem { background: #4a148c; }
  .disc-dai { background: #b71c1c; }
  .disc-mul { background: #00695c; }
  .disc-obe { background: #f57c00; color: #111; }
  .disc-val { background: #fafafa; color: #111; }
  .disc-vis { background: #5d4037; }
  .disc-san { background: #6d4c41; }
  .disc-spi { background: #1565c0; }
  .disc-mal { background: #311b92; }
  .disc-abo { background: #33691e; }
  /* card-type / clan tokens default */
  .disc-combat { background: #b03030; }
  .disc-action { background: #1565c0; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.75rem;
    padding: 1rem calc(1.25rem + var(--safe-right)) calc(2rem + var(--safe-bottom)) calc(1.25rem + var(--safe-left));
  }
  .card {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: zoom-in;
    padding: 0;
    margin: 0;
    font: inherit;
    color: inherit;
    appearance: none;
    text-align: left;
    transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
  }
  @media (hover: hover) {
    .card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: var(--shadow); }
    .card:hover .card-name { opacity: 1; transform: translateY(0); }
  }
  .card:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
  .card img {
    display: block;
    width: 100%;
    aspect-ratio: 0.716;
    object-fit: cover;
    background: #000;
  }
  .card .badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,0.85);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 0.75rem;
    font-weight: 700;
    pointer-events: none;
    text-shadow: 0 1px 2px rgba(0,0,0,0.9);
    backdrop-filter: blur(2px);
  }
  .card-name {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 0.55rem 0.5rem 0.45rem;
    font-size: 0.78rem;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.65) 70%, rgba(0,0,0,0) 100%);
    text-shadow: 0 1px 3px rgba(0,0,0,0.95);
    line-height: 1.2;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.15s ease, transform 0.15s ease;
    pointer-events: none;
  }
  /* On touch devices (no hover) show name overlay always */
  @media (hover: none) {
    .card-name { opacity: 1; transform: translateY(0); }
  }

  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: none;
    z-index: 100;
    padding: 1.5rem;
    overflow: auto;
    cursor: zoom-out;
    opacity: 0;
    transition: opacity 0.18s ease;
  }
  .modal.open { display: flex; opacity: 1; }
  .modal-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 48px;
    height: 48px;
    border-radius: 999px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--border);
    color: #fff;
    font-size: 1.6rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 110;
    user-select: none;
    transition: background 0.12s, border-color 0.12s;
  }
  @media (hover: hover) {
    .modal-nav:hover { background: var(--accent); border-color: var(--accent); }
    .modal-close:hover { background: var(--accent); border-color: var(--accent); }
  }
  .modal-nav.prev { left: calc(1rem + var(--safe-left)); }
  .modal-nav.next { right: calc(1rem + var(--safe-right)); }
  .modal-counter {
    position: fixed;
    top: calc(1rem + var(--safe-top));
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.3rem 0.85rem;
    font-size: 0.8rem;
    color: var(--muted);
    z-index: 110;
    pointer-events: none;
  }
  .modal-close, .modal-share {
    position: fixed;
    top: calc(1rem + var(--safe-top));
    width: 44px;
    height: 44px;
    border-radius: 999px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--border);
    color: #fff;
    cursor: pointer;
    z-index: 110;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close { right: calc(1rem + var(--safe-right)); font-size: 1.5rem; }
  .modal-share {
    right: calc(4rem + var(--safe-right));
    font-size: 1rem;
  }
  .modal-share svg { width: 18px; height: 18px; fill: currentColor; }
  @media (hover: hover) {
    .modal-share:hover { background: var(--accent); border-color: var(--accent); }
  }
  .modal-inner {
    margin: auto;
    display: flex;
    gap: 1.5rem;
    max-width: 1100px;
    width: 100%;
    align-items: flex-start;
    cursor: default;
  }
  .modal img {
    max-width: 360px;
    max-height: 85vh;
    border-radius: var(--radius);
    box-shadow: 0 20px 60px rgba(0,0,0,0.85);
    flex-shrink: 0;
    background: #000;
    cursor: zoom-in;
    transition: transform 0.2s ease;
    transform-origin: center center;
    touch-action: pan-x pan-y pinch-zoom;
    will-change: transform;
  }
  .modal img.zoomed {
    cursor: zoom-out;
    transform: scale(2);
  }
  .modal-info {
    flex: 1;
    min-width: 0;
    color: var(--text);
    padding-top: 0.5rem;
  }
  .modal-info h2 { margin: 0 0 0.4rem; font-size: 1.35rem; line-height: 1.25; }
  .modal-info .tags {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 1rem;
    line-height: 1.9;
  }
  .modal-info .tag {
    display: inline-block;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 2px 9px;
    border-radius: 999px;
    margin-right: 4px;
    color: var(--text);
    font-size: 0.78rem;
  }
  .modal-info .text {
    white-space: pre-wrap;
    line-height: 1.55;
    font-size: 0.95rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.95rem 1.05rem;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  /* Custom searchable combobox */
  .combobox {
    position: relative;
    flex: 1 1 auto;
    min-width: 160px;
  }
  .combobox-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.5rem 0.7rem;
    border-radius: var(--radius);
    font-size: 0.9rem;
    min-height: 36px;
    cursor: pointer;
    text-align: left;
    gap: 0.5rem;
  }
  .combobox-btn::after {
    content: "▾";
    color: var(--muted);
    font-size: 0.75rem;
    flex-shrink: 0;
  }
  .combobox-btn .ph { color: var(--muted); }
  .combobox-btn.active {
    border-color: var(--accent);
    color: #fff;
  }
  .combobox-panel {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    min-width: 220px;
    max-height: 300px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    z-index: 25;
    overflow: hidden;
    flex-direction: column;
  }
  .combobox.open .combobox-panel {
    display: flex;
  }
  .combobox-search {
    padding: 0.4rem;
    border-bottom: 1px solid var(--border);
  }
  .combobox-search input {
    width: 100%;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.45rem 0.6rem;
    font-size: 0.9rem;
  }
  .combobox-list {
    overflow-y: auto;
    overscroll-behavior: contain;
    padding: 0.25rem 0;
    flex: 1;
  }
  .combobox-option {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    color: var(--text);
    border: none;
    padding: 0.55rem 0.8rem;
    font-size: 0.9rem;
    cursor: pointer;
    font-family: inherit;
  }
  .combobox-option[aria-selected="true"] {
    background: var(--accent);
    color: #fff;
  }
  @media (hover: hover) {
    .combobox-option:hover:not([aria-selected="true"]) { background: var(--panel-2); }
  }
  .combobox-option:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: -2px;
  }
  .combobox-option.none {
    color: var(--muted);
    font-style: italic;
  }
  @media (max-width: 640px) {
    .combobox { min-width: 0; flex: 1 1 calc(50% - 0.2rem); }
    .combobox-btn { min-height: 44px; padding: 0.6rem 0.75rem; font-size: 16px; }
    .combobox-panel { max-height: 60vh; }
    .combobox-option { padding: 0.75rem 0.85rem; font-size: 0.95rem; }
  }

  .empty, .loading {
    padding: 3rem 1.25rem;
    color: var(--muted);
    text-align: center;
    font-size: 0.95rem;
  }
  .empty-actions {
    margin-top: 1rem;
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .empty-actions .chip {
    background: var(--panel);
    border: 1px solid var(--border);
  }
  .loading::before {
    content: "";
    display: inline-block;
    width: 1.1em;
    height: 1.1em;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin-right: 0.5em;
    vertical-align: -0.18em;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 900px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    input[type=search] { max-width: 100%; }
  }

  /* Drawer-only elements are hidden on desktop */
  .drawer-title, .drawer-section-label { display: none; }
  .drawer-section { display: contents; }

  /* Mobile filter drawer trigger (hidden on desktop) */
  .filters-toggle {
    display: none;
    align-items: center;
    gap: 0.4rem;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0 0.9rem;
    height: 44px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .filters-toggle[aria-expanded="true"] {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .filters-toggle .active-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    border-radius: 999px;
    background: var(--accent);
    color: #fff;
    font-size: 0.72rem;
    font-weight: 700;
  }
  .filters-toggle[aria-expanded="true"] .active-count {
    background: #fff;
    color: var(--accent);
  }
  .filters-toggle .active-count[hidden] { display: none; }

  /* Mobile drawer backdrop */
  .drawer-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 40;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .drawer-backdrop.open { display: block; opacity: 1; }

  /* Tablet portrait / large phones */
  @media (max-width: 640px) {
    header {
      padding: 0.65rem calc(0.75rem + var(--safe-right)) 0.35rem calc(0.75rem + var(--safe-left));
    }
    h1 { font-size: 1rem; }
    .sub { font-size: 0.75rem; }

    .controls {
      padding: 0.4rem calc(0.75rem + var(--safe-right)) 0.65rem calc(0.75rem + var(--safe-left));
      gap: 0.45rem;
    }
    .controls-row { gap: 0.4rem; }
    input[type=search] {
      flex: 1 1 0;
      min-width: 0;
      max-width: none;
      font-size: 16px; /* iOS no-zoom */
      padding: 0.7rem 0.85rem;
      min-height: 44px;
    }

    /* Collapse advanced controls into a drawer */
    .filters-toggle { display: inline-flex; }
    .controls-row-advanced {
      display: none;
      flex-direction: column;
      gap: 0.55rem;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: 80vh;
      overflow-y: auto;
      background: var(--panel);
      border-top: 1px solid var(--border);

  /* Landscape mobile: use horizontal modal layout to save vertical space */
  @media (max-width: 900px) and (orientation: landscape) and (max-height: 500px) {
    .modal-inner {
      flex-direction: row !important;

<script>
"use strict";

const SORT_OPTIONS = [
  { value: "",         label: "Default"              },
  { value: "name",     label: "Name (A → Z)"         },
  { value: "name-desc",label: "Name (Z → A)"         },
  { value: "count",    label: "Copies (most first)"  },
  { value: "count-asc",label: "Copies (least first)" },
  { value: "capacity", label: "Capacity (crypt)"     },
  { value: "rarity",   label: "Rarity (library)"     },
];

const RARITY_ORDER = { "Common": 0, "Uncommon": 1, "Rare": 2 };

const state = {
  data: { crypt: [], library: [] },
  q: "",
  kinds: new Set(["crypt", "library"]),
  clan: "",
  type: "",
  sort: "",
  rarities: new Set(["Common", "Uncommon", "Rare"]),
  filtered: [],
  modalIndex: -1,
  lastFocus: null,
};

const $ = (id) => document.getElementById(id);

function norm(s) {
  return (s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

const DISC_KNOWN = new Set([
  "abo","ani","aus","cel","chi","dai","dem","dom","for","mal","mel","mul","nec","obe",
  "obf","obt","pot","pre","pro","qui","san","ser","spi","tem","tha","thn","val","vic","vis"
]);

function renderDisc(token) {
  const lower = token.toLowerCase();
  const sup = token === token.toUpperCase() && token.length === 3;
  const cls = `disc disc-${lower}${sup ? " sup" : ""}`;
  const label = sup ? token.toUpperCase() : lower;
  return `<span class="${cls}">${escapeHtml(label)}</span>`;
}

function renderTextWithIcons(text) {
  if (!text) return "";
  return escapeHtml(text).replace(/\[([A-Za-z]{2,8})\]/g, (_m, tok) => renderDisc(tok));
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function matchSearch(c, q) {
  if (!q) return true;
  const hay = norm(
    c.name + " " + (c.text || "") + " " + (c.type || "") + " " +
    (c.clan || "") + " " + (c.clans || []).join(" ") + " " +
    (c.disciplines || []).join(" ")
  );
  return hay.includes(q);
}

function computeFiltered() {
  const q = norm(state.q);
  const items = [];
  if (state.kinds.has("crypt")) {
    for (const c of state.data.crypt) {
      if (!matchSearch(c, q)) continue;
      if (state.clan && c.clan !== state.clan) continue;
      items.push(c);
    }
  }
  if (state.kinds.has("library")) {
    for (const c of state.data.library) {
      if (!matchSearch(c, q)) continue;
      if (!state.rarities.has(c.rarity)) continue;
      if (state.type && !(c.type || "").split(/,\s*/).includes(state.type)) continue;
      if (state.clan && !(c.clans || []).includes(state.clan)) continue;
      items.push(c);
    }
  }
  return sortItems(items, state.sort);
}

function sortItems(items, sort) {
  if (!sort) return items;
  const arr = items.slice();
  const cmpName = (a, b) => a.name.localeCompare(b.name);
  switch (sort) {
    case "name":      arr.sort(cmpName); break;
    case "name-desc": arr.sort((a, b) => -cmpName(a, b)); break;
    case "count":     arr.sort((a, b) => b.count - a.count || cmpName(a, b)); break;
    case "count-asc": arr.sort((a, b) => a.count - b.count || cmpName(a, b)); break;
    case "capacity":
      arr.sort((a, b) => {
        const ac = a.capacity != null ? a.capacity : 999;
        const bc = b.capacity != null ? b.capacity : 999;
        return ac - bc || cmpName(a, b);
      });
      break;
    case "rarity":
      arr.sort((a, b) => {
        const ar = a.rarity != null ? (RARITY_ORDER[a.rarity] ?? 99) : -1;
        const br = b.rarity != null ? (RARITY_ORDER[b.rarity] ?? 99) : -1;
        return ar - br || cmpName(a, b);
      });
      break;
  }
  return arr;
}

function render() {
  state.filtered = computeFiltered();
  const grid = $("grid");
  const frag = document.createDocumentFragment();
  state.filtered.forEach((c, idx) => {
    const el = document.createElement("button");
    el.type = "button";
    el.className = "card";
    el.setAttribute("role", "listitem");
    el.setAttribute("aria-label", `${c.name}, ${c.count} copies`);
    el.innerHTML = `
      <img loading="lazy" decoding="async" width="160" height="223" src="${encodeURI(c.img)}" alt="${escapeHtml(c.name)}">
      <span class="badge" aria-hidden="true">×${c.count}</span>
      <span class="card-name" aria-hidden="true">${escapeHtml(c.name)}</span>
    `;
    el.addEventListener("click", () => openModal(idx));
    frag.appendChild(el);
  });
  grid.replaceChildren(frag);

  const totalCount = state.filtered.reduce((s, c) => s + c.count, 0);
  $("count").textContent = `${state.filtered.length} unique · ${totalCount} copies`;
  $("empty").hidden = state.filtered.length !== 0;
  renderActiveFilters();
  updateResetButton();
  updateFiltersCount();
  syncUrl();
}

function countActiveFilters() {
  let n = 0;
  if (state.q) n++;
  if (state.clan) n++;
  if (state.type) n++;
  if (state.sort) n++;
  if (state.kinds.size !== 2) n++;
  if (state.rarities.size !== 3) n++;
  return n;
}

function updateResetButton() {
  const n = countActiveFilters();
  $("reset").hidden = n === 0;
}

function updateFiltersCount() {
  // Exclude the search box from the drawer badge (search is visible outside the drawer)
  let n = 0;
  if (state.clan) n++;
  if (state.type) n++;
  if (state.sort) n++;
  if (state.kinds.size !== 2) n++;
  if (state.rarities.size !== 3) n++;
  const badge = $("filters-count");
  if (n > 0) { badge.hidden = false; badge.textContent = String(n); }
  else { badge.hidden = true; }
}

function renderActiveFilters() {
  const host = $("active-filters");
  const chips = [];
  const mk = (label, onRemove) =>
    `<button class="filter-chip" data-rm="${onRemove}" type="button" aria-label="Remove filter ${escapeHtml(label)}">${escapeHtml(label)}<span class="x" aria-hidden="true">×</span></button>`;
  if (state.q) chips.push(mk(`"${state.q}"`, "q"));
  if (state.clan) chips.push(mk(`Clan: ${state.clan}`, "clan"));
  if (state.type) chips.push(mk(`Type: ${state.type}`, "type"));
  if (state.sort) {
    const opt = SORT_OPTIONS.find(s => s.value === state.sort);
    if (opt) chips.push(mk(`Sort: ${opt.label}`, "sort"));
  }
  if (!state.kinds.has("crypt")) chips.push(mk("Crypt off", "kind:crypt"));
  if (!state.kinds.has("library")) chips.push(mk("Library off", "kind:library"));
  for (const r of ["Common", "Uncommon", "Rare"]) {
    if (!state.rarities.has(r)) chips.push(mk(`${r} off`, "rarity:" + r));
  }
  host.innerHTML = chips.length ? `<span class="label">Active:</span>${chips.join("")}` : "";
}

$("active-filters").addEventListener("click", e => {
  const btn = e.target.closest("[data-rm]");
  if (!btn) return;
  const rm = btn.dataset.rm;
  if (rm === "q") { state.q = ""; $("q").value = ""; }
  else if (rm === "clan") { setComboValue("clan", ""); }
  else if (rm === "type") { setComboValue("type", ""); }
  else if (rm === "sort") { setComboValue("sort", ""); }
  else if (rm.startsWith("kind:")) {
    const k = rm.slice(5);
    state.kinds.add(k);
    document.querySelector(`[data-kind="${k}"]`).setAttribute("aria-pressed", "true");
  } else if (rm.startsWith("rarity:")) {
    const r = rm.slice(7);
    state.rarities.add(r);
    document.querySelector(`[data-rarity="${r}"]`).setAttribute("aria-pressed", "true");
  }
  render();
});

/* --- URL persistence of filter state --- */
let urlSyncTimer;
function syncUrl() {
  clearTimeout(urlSyncTimer);
  urlSyncTimer = setTimeout(() => {
    if (state.modalIndex >= 0) return;
    const p = new URLSearchParams();
    if (state.q) p.set("q", state.q);
    if (state.clan) p.set("clan", state.clan);
    if (state.type) p.set("type", state.type);
    if (state.sort) p.set("sort", state.sort);
    if (state.kinds.size !== 2) p.set("kinds", [...state.kinds].join(","));
    if (state.rarities.size !== 3) p.set("rarities", [...state.rarities].join(","));
    const qs = p.toString();
    const url = qs ? `${location.pathname}?${qs}` : location.pathname;
    history.replaceState(null, "", url + location.hash);
  }, 200);
}

function loadStateFromUrl() {
  const p = new URLSearchParams(location.search);
  if (p.has("q")) { state.q = p.get("q"); $("q").value = state.q; }
  if (p.has("clan")) { state.clan = p.get("clan"); setComboLabel("clan", state.clan); }
  if (p.has("type")) { state.type = p.get("type"); setComboLabel("type", state.type); }
  if (p.has("sort")) { state.sort = p.get("sort"); setComboLabel("sort", state.sort); }
  if (p.has("kinds")) {
    state.kinds = new Set(p.get("kinds").split(",").filter(Boolean));
    document.querySelectorAll("[data-kind]").forEach(b =>
      b.setAttribute("aria-pressed", String(state.kinds.has(b.dataset.kind))));
  }
  if (p.has("rarities")) {
    state.rarities = new Set(p.get("rarities").split(",").filter(Boolean));
    document.querySelectorAll("[data-rarity]").forEach(b =>
      b.setAttribute("aria-pressed", String(state.rarities.has(b.dataset.rarity))));
  }
  if (state.type) applyTypeConstraint();
}

/* --- preload neighbor images in modal --- */
function preloadNeighbors(idx) {
  const n = state.filtered.length;
  if (n < 2) return;
  for (const i of [(idx + 1) % n, (idx - 1 + n) % n]) {
    const im = new Image();
    im.src = encodeURI(state.filtered[i].img);
  }
}

function discList(arr, sep = " ") {
  return arr.map(d => renderDisc(d)).join(sep);
}

function buildTags(c) {
  const tags = [];
  if (c.kind === "crypt") {
    if (c.clan) tags.push(`<span class="tag">${escapeHtml(c.clan)}</span>`);
    if (c.capacity != null) tags.push(`<span class="tag">cap ${c.capacity}</span>`);
    if (c.group) tags.push(`<span class="tag">group ${c.group}</span>`);
    if (c.title) tags.push(`<span class="tag">${escapeHtml(c.title)}</span>`);
    if (c.disciplines && c.disciplines.length)
      tags.push(`<span class="tag">${discList(c.disciplines)}</span>`);
  } else {
    if (c.type) tags.push(`<span class="tag">${escapeHtml(c.type)}</span>`);
    if (c.rarity) tags.push(`<span class="tag">${escapeHtml(c.rarity)}</span>`);
    if (c.cost) tags.push(`<span class="tag">${escapeHtml(c.cost)}</span>`);
    if (c.disciplines && c.disciplines.length)
      tags.push(`<span class="tag">${discList(c.disciplines, " ")}</span>`);
    if (c.clans && c.clans.length)
      tags.push(`<span class="tag">${c.clans.map(escapeHtml).join(" · ")}</span>`);
  }
  tags.push(`<span class="tag">×${c.count} in cube</span>`);
  return tags.join(" ");
}

/* --- Modal --- */
function openModal(idx, pushHistory = true) {
  if (idx < 0 || idx >= state.filtered.length) return;
  if (state.modalIndex === -1) state.lastFocus = document.activeElement;
  const firstOpen = state.modalIndex === -1;
  state.modalIndex = idx;
  const c = state.filtered[idx];
  c.kind = c.kind || (state.data.crypt.includes(c) ? "crypt" : "library");
  const img = $("modal-img");
  img.src = encodeURI(c.img);
  img.alt = c.name;
  img.classList.remove("zoomed");
  $("modal-name").textContent = c.name;
  $("modal-tags").innerHTML = buildTags(c);
  const textEl = $("modal-text");
  let body = c.text || "(text unavailable)";
  if (c.draft && c.draft_text) body += "\n\n" + c.draft_text;
  textEl.innerHTML = renderTextWithIcons(body);
  $("modal-counter").textContent = `${idx + 1} / ${state.filtered.length}`;
  $("modal-share").hidden = !(navigator.share || navigator.clipboard);
  preloadNeighbors(idx);

  const modal = $("modal");
  modal.hidden = false;
  requestAnimationFrame(() => modal.classList.add("open"));
  document.body.style.overflow = "hidden";
  $("modal-close").focus();

  const hash = "#" + encodeURIComponent(c.name);
  if (firstOpen && pushHistory) {
    history.pushState({ modal: true }, "", hash);
  } else if (firstOpen) {
    // deep-link entry: keep state null so "close" doesn't escape the site
    history.replaceState(null, "", hash);
  } else {
    history.replaceState(history.state, "", hash);
  }
}

function stepModal(delta) {
  if (state.modalIndex < 0 || !state.filtered.length) return;
  const n = state.filtered.length;
  openModal((state.modalIndex + delta + n) % n, false);
}

function closeModal(fromPopState = false) {
  if (state.modalIndex < 0) return;
  state.modalIndex = -1;
  const modal = $("modal");
  modal.classList.remove("open");
  setTimeout(() => { modal.hidden = true; }, 180);
  document.body.style.overflow = "";
  if (state.lastFocus && state.lastFocus.focus) {
    try { state.lastFocus.focus(); } catch (_) {}
  }
  if (!fromPopState) {
    if (history.state && history.state.modal) history.back();
    else history.replaceState(null, "", location.pathname + location.search);
  } else {
    history.replaceState(null, "", location.pathname + location.search);
  }
}

window.addEventListener("popstate", () => {
  if (state.modalIndex >= 0) closeModal(true);
});

/* --- Focus trap in modal --- */
const FOCUSABLE = 'button:not([hidden]):not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])';
function trapFocus(e) {
  if (state.modalIndex < 0 || e.key !== "Tab") return;
  const modal = $("modal");
  const nodes = Array.from(modal.querySelectorAll(FOCUSABLE)).filter(n => !n.hidden && n.offsetParent !== null);
  if (!nodes.length) return;
  const first = nodes[0], last = nodes[nodes.length - 1];
  if (e.shiftKey && document.activeElement === first) {
    last.focus(); e.preventDefault();
  } else if (!e.shiftKey && document.activeElement === last) {
    first.focus(); e.preventDefault();
  }
}

/* --- Modal image zoom (click & double-tap) --- */
const modalImg = $("modal-img");
modalImg.addEventListener("click", e => {
  e.stopPropagation();
  modalImg.classList.toggle("zoomed");
});
let lastTap = 0;
modalImg.addEventListener("touchend", e => {
  const now = Date.now();
  if (now - lastTap < 320 && e.changedTouches.length === 1) {
    modalImg.classList.toggle("zoomed");
    e.preventDefault();
  }
  lastTap = now;
});

/* --- event wiring (static) --- */
const debouncedRender = debounce(render, 120);

$("q").addEventListener("input", e => { state.q = e.target.value; debouncedRender(); });

function applyTypeConstraint() {
  if (!state.type) return;
  state.kinds.delete("crypt");
  state.kinds.add("library");
  document.querySelector('[data-kind="crypt"]').setAttribute("aria-pressed", "false");
  document.querySelector('[data-kind="library"]').setAttribute("aria-pressed", "true");
}

document.querySelectorAll("[data-kind]").forEach(b => b.addEventListener("click", () => {
  const k = b.dataset.kind;
  const turningOn = !state.kinds.has(k);
  if (turningOn) state.kinds.add(k); else state.kinds.delete(k);
  b.setAttribute("aria-pressed", String(turningOn));
  if (k === "crypt" && turningOn && state.type) {
    setComboValue("type", "");
  }
  render();
}));

document.querySelectorAll("[data-rarity]").forEach(b => b.addEventListener("click", () => {
  const r = b.dataset.rarity;
  if (state.rarities.has(r)) state.rarities.delete(r); else state.rarities.add(r);
  b.setAttribute("aria-pressed", String(state.rarities.has(r)));
  render();
}));

function resetAll() {
  state.q = "";
  state.clan = "";
  state.type = "";
  state.sort = "";
  state.kinds = new Set(["crypt", "library"]);
  state.rarities = new Set(["Common", "Uncommon", "Rare"]);
  $("q").value = "";
  setComboLabel("clan", "");
  setComboLabel("type", "");
  setComboLabel("sort", "");
  document.querySelectorAll("[data-kind], [data-rarity]").forEach(b => b.setAttribute("aria-pressed", "true"));
  render();
}

$("reset").addEventListener("click", resetAll);
$("empty-reset").addEventListener("click", resetAll);

$("modal").addEventListener("click", e => {
  if (e.target.closest(".modal-info") || e.target.closest(".modal-nav") ||
      e.target.closest(".modal-close") || e.target.closest(".modal-share") ||
      e.target.closest("img")) return;
  closeModal();
});
$("modal-close").addEventListener("click", () => closeModal());
$("modal-prev").addEventListener("click", e => { e.stopPropagation(); stepModal(-1); });
$("modal-next").addEventListener("click", e => { e.stopPropagation(); stepModal(1); });

/* --- Web Share API --- */
$("modal-share").addEventListener("click", async e => {
  e.stopPropagation();
  if (state.modalIndex < 0) return;
  const c = state.filtered[state.modalIndex];
  const url = location.origin + location.pathname + "#" + encodeURIComponent(c.name);
  const payload = { title: c.name, text: `${c.name} — VTES Draft Cube`, url };
  try {
    if (navigator.share) await navigator.share(payload);
    else if (navigator.clipboard) {
      await navigator.clipboard.writeText(url);
      showToast("Link copied");
    }
  } catch (_) { /* user cancelled */ }
});

function showToast(msg) {
  let el = document.getElementById("toast");
  if (!el) {
    el = document.createElement("div");
    el.id = "toast";
    el.style.cssText = "position:fixed;left:50%;bottom:calc(2rem + var(--safe-bottom));transform:translateX(-50%);background:rgba(0,0,0,0.9);color:#fff;padding:0.6rem 1rem;border-radius:999px;font-size:0.85rem;z-index:500;opacity:0;transition:opacity 0.2s;pointer-events:none";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  requestAnimationFrame(() => { el.style.opacity = "1"; });
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = "0"; }, 1800);
}

/* --- Keyboard in modal --- */
document.addEventListener("keydown", e => {
  if (state.modalIndex < 0) return;
  if (e.key === "Escape") closeModal();
  else if (e.key === "ArrowLeft") stepModal(-1);
  else if (e.key === "ArrowRight") stepModal(1);
  else if (e.key === "Tab") trapFocus(e);
});

/* --- Touch gestures in modal: swipe left/right = prev/next, swipe down = close --- */
let touchStartX = 0, touchStartY = 0, touchTime = 0;
$("modal").addEventListener("touchstart", e => {
  if (state.modalIndex < 0) return;
  const t = e.changedTouches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchTime = Date.now();
}, { passive: true });
$("modal").addEventListener("touchend", e => {
  if (state.modalIndex < 0) return;
  if (modalImg.classList.contains("zoomed")) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const dt = Date.now() - touchTime;
  if (dt >= 600) return;
  const absX = Math.abs(dx), absY = Math.abs(dy);
  if (absX > 60 && absX > absY * 1.5) {
    stepModal(dx < 0 ? 1 : -1);
  } else if (dy > 80 && absY > absX * 1.5) {
    closeModal();
  }
}, { passive: true });

/* --- Filter drawer (mobile) --- */
const filtersToggle = $("filters-toggle");
const advancedRow = $("controls-advanced");
const drawerBackdrop = $("drawer-backdrop");

function isMobile() { return window.matchMedia("(max-width: 640px)").matches; }
function openDrawer() {
  if (!isMobile()) return;
  advancedRow.classList.add("open");
  drawerBackdrop.classList.add("open");
  filtersToggle.setAttribute("aria-expanded", "true");
  document.body.style.overflow = "hidden";
}
function closeDrawer() {
  advancedRow.classList.remove("open");
  drawerBackdrop.classList.remove("open");
  filtersToggle.setAttribute("aria-expanded", "false");
  if (state.modalIndex < 0) document.body.style.overflow = "";
}
filtersToggle.addEventListener("click", () => {
  if (advancedRow.classList.contains("open")) closeDrawer(); else openDrawer();
});
$("drawer-close").addEventListener("click", closeDrawer);
drawerBackdrop.addEventListener("click", closeDrawer);

/* --- Sticky topbar shadow --- */
const topbar = $("topbar");
const onScroll = () => topbar.classList.toggle("scrolled", window.scrollY > 0);
window.addEventListener("scroll", onScroll, { passive: true });
onScroll();

/* --- Combobox widget --- */
const comboConfigs = {}; // id -> { options: [{value,label}], onChange }

function initCombobox(cbId, options, onChange) {
  const root = $(cbId);
  const btn = root.querySelector(".combobox-btn");
  const label = root.querySelector(".combobox-label");
  const panel = root.querySelector(".combobox-panel");
  const list = root.querySelector(".combobox-list");
  const searchInput = root.querySelector(".combobox-search input");
  comboConfigs[root.dataset.for] = { root, options, btn, label, panel, list, searchInput, onChange };

  const renderOptions = (q = "") => {
    const nq = norm(q);
    list.innerHTML = "";
    const matches = options.filter(o => !nq || norm(o.label).includes(nq) || norm(o.value).includes(nq));
    if (!matches.length) {
      const empty = document.createElement("div");
      empty.className = "combobox-option none";
      empty.textContent = "No matches";
      list.appendChild(empty);
      return;
    }
    for (const o of matches) {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "combobox-option";
      b.setAttribute("role", "option");
      b.dataset.value = o.value;
      b.textContent = o.label;
      if (o.value === "" && !o.label) b.classList.add("none");
      list.appendChild(b);
    }
    updateSelected();
  };

  const updateSelected = () => {
    const cur = getComboState(root.dataset.for);
    list.querySelectorAll(".combobox-option").forEach(el => {
      el.setAttribute("aria-selected", String(el.dataset.value === cur));
    });
  };

  renderOptions();

  btn.addEventListener("click", () => {
    const wasOpen = root.classList.contains("open");
    closeAllCombos();
    if (!wasOpen) {
      root.classList.add("open");
      btn.setAttribute("aria-expanded", "true");
      renderOptions("");
      if (searchInput) {
        searchInput.value = "";
        setTimeout(() => searchInput.focus(), 30);
      }
    }
  });

  if (searchInput) {
    searchInput.addEventListener("input", e => renderOptions(e.target.value));
    searchInput.addEventListener("keydown", e => {
      if (e.key === "Escape") { closeAllCombos(); btn.focus(); }
      else if (e.key === "ArrowDown") {
        const first = list.querySelector(".combobox-option:not(.none)");
        if (first) { first.focus(); e.preventDefault(); }
      } else if (e.key === "Enter") {
        const first = list.querySelector(".combobox-option:not(.none)");
        if (first) { first.click(); e.preventDefault(); }
      }
    });
  }

  list.addEventListener("click", e => {
    const opt = e.target.closest(".combobox-option:not(.none)");
    if (!opt) return;
    onChange(opt.dataset.value, opt.textContent);
    closeAllCombos();
    btn.focus();
  });

  list.addEventListener("keydown", e => {
    const opts = Array.from(list.querySelectorAll(".combobox-option:not(.none)"));
    const idx = opts.indexOf(document.activeElement);
    if (e.key === "ArrowDown" && idx < opts.length - 1) { opts[idx + 1].focus(); e.preventDefault(); }
    else if (e.key === "ArrowUp") {
      if (idx > 0) { opts[idx - 1].focus(); e.preventDefault(); }
      else if (searchInput) { searchInput.focus(); e.preventDefault(); }
    }
    else if (e.key === "Escape") { closeAllCombos(); btn.focus(); }
    else if (e.key === "Enter" && idx >= 0) { opts[idx].click(); e.preventDefault(); }
  });
}

function closeAllCombos() {
  document.querySelectorAll(".combobox.open").forEach(cb => {
    cb.classList.remove("open");
    const b = cb.querySelector(".combobox-btn");
    if (b) b.setAttribute("aria-expanded", "false");
  });
}

document.addEventListener("click", e => {
  if (!e.target.closest(".combobox")) closeAllCombos();
});

function getComboState(key) {
  if (key === "clan") return state.clan;
  if (key === "type") return state.type;
  if (key === "sort") return state.sort;
  return "";
}

function setComboLabel(key, value) {
  const cfg = comboConfigs[key];
  if (!cfg) return;
  const opt = cfg.options.find(o => o.value === value);
  const ph = !value;
  cfg.label.textContent = opt ? opt.label : (key === "clan" ? "All clans" : key === "type" ? "All types" : "Default");
  cfg.label.classList.toggle("ph", ph);
  cfg.btn.classList.toggle("active", !ph);
}

function setComboValue(key, value) {
  if (key === "clan") state.clan = value;
  else if (key === "type") state.type = value;
  else if (key === "sort") state.sort = value;
  setComboLabel(key, value);
}

/* --- data load --- */

fetch("data/cards.json")
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => {
    data.crypt.forEach(c => c.kind = "crypt");
    data.library.forEach(c => c.kind = "library");
    state.data = data;

    const clans = [...new Set(data.crypt.map(c => c.clan).filter(Boolean))].sort();
    initCombobox("cb-clan",
      [{ value: "", label: "All clans" }, ...clans.map(c => ({ value: c, label: c }))],
      (val) => { state.clan = val; setComboLabel("clan", val); render(); }
    );

    const types = [...new Set(data.library.flatMap(c => (c.type || "").split(/,\s*/).filter(Boolean)))].sort();
    initCombobox("cb-type",
      [{ value: "", label: "All types" }, ...types.map(t => ({ value: t, label: t }))],
      (val) => {
        state.type = val;
        setComboLabel("type", val);
        applyTypeConstraint();
        render();
      }
    );

    initCombobox("cb-sort", SORT_OPTIONS,
      (val) => { state.sort = val; setComboLabel("sort", val); render(); }
    );

    const cryptCopies = data.crypt.reduce((s, c) => s + c.count, 0);
    const libCopies = data.library.reduce((s, c) => s + c.count, 0);
    $("summary").textContent =
      `${data.crypt.length} crypt (${cryptCopies}) · ${data.library.length} library (${libCopies})`;

    $("loading").hidden = true;
    loadStateFromUrl();
    render();

    // Deep link: open card from URL hash
    const hash = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (hash) {
      const idx = state.filtered.findIndex(c => c.name === hash);
      if (idx >= 0) openModal(idx, false);
    }
  })
  .catch(e => {
    $("loading").hidden = true;
    $("grid").innerHTML =
      `<div class="empty">Failed to load data/cards.json: ${escapeHtml(e.message)}</div>`;
  });

/* --- PWA service worker --- */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
