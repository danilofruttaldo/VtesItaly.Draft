name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dev tooling (JS)
        run: npm ci

      - name: Install dev tooling (Python)
        run: python -m pip install --upgrade ruff

      - name: Prettier
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Ruff (lint)
        run: python -m ruff check scripts/ tests/

      - name: Ruff (format check)
        run: python -m ruff format --check scripts/ tests/

      - name: Tests (Node + Python)
        run: npm test

      - name: Bump sw.js VERSION to release timestamp
        run: |
          ts=$(date -u +%Y%m%d-%H%M%S)
          sed -i -E "s/^const VERSION = \".*\";$/const VERSION = \"$ts\";/" sw.js
          grep '^const VERSION' sw.js

      - name: Stage site (exclude scripts, build inputs, docs)
        run: |
          mkdir -p _site/data _site/images
          cp index.html manifest.webmanifest sw.js robots.txt .nojekyll _site/
          [ -f CNAME ] && cp CNAME _site/ || true
          cp -r assets _site/
          cp data/cards.json _site/data/
          cp -r images/crypt images/library-common images/library-uncommon images/library-rare _site/images/
          du -sh _site

      - name: Minify app.js / core.mjs / styles.css / sw.js in the staged copy
        run: npm run minify

      - name: Lighthouse CI (accessibility blocking, others informational)
        run: npx --yes @lhci/cli@0.14.x autorun --config=.lighthouserc.json
        continue-on-error: false

      - name: Enforce artifact size budget
        run: |
          SIZE_MB=$(du -sm _site | cut -f1)
          echo "Deploy artifact: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 60 ]; then
            echo "::error::_site is ${SIZE_MB}MB, above the 60MB budget. Review images/ or compress further."
            exit 1
          fi

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
